<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureScan – Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0b1229;
      --bg-mid:     #0f1a3a;
      --bg-card:    #152040;
      --border:     rgba(255,255,255,0.08);
      --input-bg:   rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.12);
      --input-focus: #3b82f6;
      --text-primary: #e8edf8;
      --text-muted:   #7a8fb5;
      --text-placeholder: #4a5e80;
      --accent-start: #3b82f6;
      --accent-end:   #06b6d4;
      --link:  #38bdf8;
      --check-border: rgba(255,255,255,0.18);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a2d5a 0%, var(--bg-deep) 70%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Ambient glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 480px; height: 480px; background: #2563eb; top: -120px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 360px; height: 360px; background: #0ea5e9; bottom: -80px; right: -80px; animation-delay: -6s; }
    .blob-3 { width: 260px; height: 260px; background: #6366f1; top: 40%; right: 15%; animation-delay: -3s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.06); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 64px rgba(0,0,0,0.5),
        0 4px 16px rgba(0,0,0,0.3);
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / Brand */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--accent-start);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(59,130,246,0.4);
      background: rgba(59,130,246,0.1);
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--accent-start);
      fill: rgba(59,130,246,0.18);
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.01em;
    }

    /* Title */
    .card-title {
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    /* Form groups */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      display: flex;
      align-items: center;
      pointer-events: none;
      opacity: 0.45;
    }

    .input-icon svg {
      width: 15px;
      height: 15px;
      stroke: var(--text-primary);
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 9px;
      color: var(--text-primary);
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: var(--text-placeholder); }

    input:focus {
      border-color: var(--input-focus);
      background: rgba(59,130,246,0.07);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    /* Remember / Forgot row */
    .row-aux {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 14px 0 22px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .remember input[type="checkbox"] {
      appearance: none;
      width: 15px;
      height: 15px;
      border: 1px solid var(--check-border);
      border-radius: 4px;
      background: var(--input-bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      padding: 0;
    }

    .remember input[type="checkbox"]:checked {
      background: var(--accent-start);
      border-color: var(--accent-start);
    }

    .remember input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 4px;
      width: 5px; height: 8px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .remember span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .forgot {
      font-size: 0.75rem;
      color: var(--link);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot:hover { opacity: 0.75; }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 11px;
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
      border: none;
      border-radius: 9px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(59,130,246,0.35);
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,0.45); }
    .btn-login:hover::after { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* Register link */
    .register {
      text-align: center;
      margin-top: 18px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .register a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .register a:hover { opacity: 0.75; }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.5C16.5 22.15 20 17.25 20 12V6L12 2z"/>
        </svg>
      </div>
      <span class="brand-name">SecureScan</span>
    </div>

    <h1 class="card-title">Connexion</h1>

    <div class="form-group">
      <label for="email">Adresse e-mail</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
        </span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <div class="row-aux">
      <label class="remember">
        <input type="checkbox" />
        <span>Se souvenir de moi</span>
      </label>
      <a href="#" class="forgot">Mot de passe oublié ?</a>
    </div>

    <button class="btn-login">Connexion</button>

    <p class="register">
      Pas de compte ? <a href="#">Inscris-toi !</a>
    </p>

  </div>

</body>
</html>
