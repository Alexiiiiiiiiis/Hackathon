<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureScan – Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <a class="brand" href="index.html" style="text-decoration:none;">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.5C16.5 22.15 20 17.25 20 12V6L12 2z"/>
        </svg>
      </div>
      <span class="brand-name">SecureScan</span>
    </a>

    <h1 class="card-title">Connexion</h1>

    <div class="form-group">
      <label for="email">Adresse e-mail</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
          </svg>
        </span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <div class="row-aux">
      <label class="remember">
        <input type="checkbox" />
        <span>Se souvenir de moi</span>
      </label>
      <a href="#" class="forgot">Mot de passe oublié ?</a>
    </div>

    <div class="error-box" id="login-error"></div>

    <button class="btn-login" id="btn-login" onclick="handleLogin()">
      <span id="btn-text">Connexion</span>
      <div class="spinner" id="btn-spinner"></div>
    </button>

    <p class="register">
      Pas de compte ? <a href="register.html">Inscris-toi !</a>
    </p>

  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
